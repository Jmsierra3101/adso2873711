<!DOCTYPE html>

    <title>tables</title>
    <link rel="stylesheet" href="cc/master.css">
    <style>
        table {
            border-collapse: collapse;
            color: #fff9;
            font-size: 0.8rem;
            width: 100%;
            tr{
                th{
                    background-color: #fff9;
                    color: #0009;
                    padding: 0.6rem;
                }
                td{
                    background-color: #0009;
                    padding: 0.4rem 0.2rem;
                }
            }
            tr:nth-child(even) td{
                background-color: #0006;
            }
            tfoot {
                td{
                    background-color: #fff9;
                    color: #0009;
                    text-align: center;
                }
            }
        }
    </style>
</head>
